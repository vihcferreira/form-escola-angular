<form class="container my-4">
    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label" for="matricula">Matricula</label>
            <input class="form-control" type="text" id="matricula" name="matricula" [(ngModel)]="aluno.Matricula">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label" for="nome">Nome</label>
            <input class="form-control" type="text" id="nome" name="nome" [(ngModel)]="aluno.Nome">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label" for="dataNascimento">Data de Nascimento</label>
            <input class="form-control" type="date" id="dataNascimento" name="dataNascimento" [(ngModel)]="aluno.DataNascimento">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label" for="telefone">Telefone</label>
            <input class="form-control" mask="(00) 00000-0000" type="text" id="telefone" name="telefone" [(ngModel)]="aluno.Telefone">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label" for="email">E-mail</label>
            <input class="form-control" type="email" id="email" name="email" [(ngModel)]="aluno.Email">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label" for="endereco">Endereço</label>
            <input class="form-control" type="text" id="endereco" name="endereco" [(ngModel)]="aluno.Endereco">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label" for="cpf">CPF</label>
            <input class="form-control" mask="000.000.000-00" type="text" id="cpf" name="cpf" [(ngModel)]="aluno.Cpf">
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label" for="anoEscolar">Ano Escolar</label>
            <input class="form-control" type="text" id="anoEscolar" name="anoEscolar" [(ngModel)]="aluno.AnoEscolar">
        </div>
    </div>
    
    <div class="d-flex gap-2 mt-3 w-100">
        <button type="button" class="btn btn-danger flex-grow-1" (click)="voltar()">
            <i class="bi bi-x-lg"></i> Cancelar
        </button>
        <button type="button" class="btn btn-success flex-grow-1" (click)="salvar()">
            <i class="bi bi-check-lg"></i> Salvar
        </button>
    </div>
</form>
