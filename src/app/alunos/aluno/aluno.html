<form>
    <label for="matricula">Matricula</label>
    <input type="text" id="matricula" name="matricula" [(ngModel)]="aluno.Matricula">
    <label for="nome">Nome</label>
    <input type="text" id="nome" name="nome" [(ngModel)]="aluno.Nome">
    <label for="dataNascimento">Data de Nascimento</label>
    <input type="date" id="dataNascimento" name="dataNascimento" [(ngModel)]="aluno.DataNascimento">
    <label for="telefone">Telefone</label>
    <input type="text" id="telefone" name="telefone" [(ngModel)]="aluno.Telefone">
    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" [(ngModel)]="aluno.Email">
    <label for="endereco">Endereço</label>
    <input type="text" id="endereco" name="endereco" [(ngModel)]="aluno.Endereco">
    <label for="cpf">CPF</label>
    <input type="text" id="cpf" name="cpf" [(ngModel)]="aluno.Cpf">
    <label for="anoEscolar">Ano Escolar</label>
    <input type="text" id="anoEscolar" name="anoEscolar" [(ngModel)]="aluno.AnoEscolar">
    <button type="button" class="btn-salvar" (click)="salvar()">Salvar</button>
    <button type="button" class="btn-cancelar" (click)="voltar()">Cancelar</button>
</form>
